<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Ellen AI - Rust Backend 测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 { color: #e94560; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }
    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 16px;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #666;
      transition: background 0.3s;
    }
    .dot.connected { background: #0f0; box-shadow: 0 0 8px #0f0; }
    .dot.error { background: #f44; box-shadow: 0 0 8px #f44; }
    .dot.thinking { background: #ff9f43; animation: pulse 1s infinite; }
    .dot.speaking { background: #00d2d3; animation: pulse 0.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 15px;
    }
    input[type="text"]::placeholder { color: #888; }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .logs {
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .log-entry {
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
    }
    .log-sent { background: #0f346044; color: #74b9ff; }
    .log-recv { background: #1a1a2e44; }
    .log-status { color: #ff9f43; }
    .log-error { color: #ff6b6b; }
    .log-sync { color: #55efc4; }
    .timestamp { color: #666; font-size: 11px; }
    .label {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-right: 6px;
    }
    .label-sent { background: #0984e3; }
    .label-recv { background: #00b894; }
    .json {
      margin-top: 4px;
      padding: 8px;
      background: #0a0a1a;
      border-radius: 4px;
      color: #a8e6cf;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 12px;
    }
    .avatar {
      font-size: 48px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="avatar">🦈</div>
  <h1>Ellen AI - Rust Backend</h1>
  <p class="subtitle">WebSocket 测试面板 | ws://localhost:8081</p>

  <div class="panel">
    <div class="status-bar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">未连接</span>
      <button id="connectBtn" onclick="toggleConnection()">连接</button>
    </div>
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="输入消息... (例: おはよう、エレン)" disabled>
      <button id="sendBtn" onclick="sendMessage()" disabled>发送</button>
    </div>
  </div>

  <div class="panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <strong>消息日志</strong>
      <button onclick="clearLogs()" style="padding:4px 12px; font-size:12px;">清空</button>
    </div>
    <div class="logs" id="logs"></div>
  </div>

  <script>
    let ws = null;
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const connectBtn = document.getElementById('connectBtn');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const logs = document.getElementById('logs');

    function setStatus(state, text) {
      statusDot.className = 'dot ' + state;
      statusText.textContent = text;
    }

    function addLog(type, label, data) {
      const entry = document.createElement('div');
      entry.className = 'log-entry log-' + type;
      const time = new Date().toLocaleTimeString('zh-CN', {hour12:false});
      entry.innerHTML = `
        <span class="timestamp">${time}</span>
        <span class="label label-${label}">${label.toUpperCase()}</span>
        <span class="log-${type}">${type}</span>
        <div class="json">${JSON.stringify(data, null, 2)}</div>
      `;
      logs.appendChild(entry);
      logs.scrollTop = logs.scrollHeight;
    }

    function clearLogs() { logs.innerHTML = ''; }

    function toggleConnection() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();
        return;
      }
      connect();
    }

    function connect() {
      setStatus('thinking', '连接中...');
      connectBtn.disabled = true;

      ws = new WebSocket('ws://localhost:8081/');

      ws.onopen = () => {
        setStatus('connected', '已连接');
        connectBtn.textContent = '断开';
        connectBtn.disabled = false;
        msgInput.disabled = false;
        sendBtn.disabled = false;
        msgInput.focus();
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'status') {
          addLog(data.status, 'recv', data);
          if (data.status === 'thinking') setStatus('thinking', 'Ellen 思考中...');
          else if (data.status === 'speaking') setStatus('speaking', 'Ellen 说话中...');
          else if (data.status === 'ready') setStatus('connected', '已连接');
          else if (data.status === 'error') setStatus('error', '错误: ' + (data.message || ''));
        } else if (data.type === 'multimodal_sync') {
          addLog('sync', 'recv', data);
        }
      };

      ws.onerror = (e) => {
        setStatus('error', '连接错误');
        addLog('error', 'recv', {error: 'WebSocket error'});
      };

      ws.onclose = () => {
        setStatus('', '未连接');
        connectBtn.textContent = '连接';
        connectBtn.disabled = false;
        msgInput.disabled = true;
        sendBtn.disabled = true;
        ws = null;
      };
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !ws) return;
      const msg = { type: 'message', content: text, timestamp: Date.now() };
      ws.send(JSON.stringify(msg));
      addLog('sent', 'sent', msg);
      msgInput.value = '';
    }

    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
